<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="theme-color" content="#2f6b3f" />
    <base href="/" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="Construction operations, project visibility, and field-ready delivery support for industrial, commercial, renovation, and residential work."
    />
    <meta
      name="keywords"
      content="construction operations, industrial delivery, commercial construction, renovation support, project coordination"
    />
    <meta property="og:image" content="/assets/logo.svg" />
    <meta property="og:title" content="Construction Operations Portal" />
    <meta
      property="og:description"
      content="Construction operations, project visibility, and field-ready delivery support for industrial, commercial, renovation, and residential work."
    />
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Construction Operations Portal" />
    <meta
      name="twitter:description"
      content="Construction operations, project visibility, and field-ready delivery support for industrial, commercial, renovation, and residential work."
    />
    <meta name="twitter:image" content="/assets/logo.svg" />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="alternate icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" href="/assets/logo.svg" />
    <link rel="manifest" href="/manifest.json" />
    <title>Construction Operations Portal</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css"
    />
    <link
      href="https://unpkg.com/aos@2.3.1/dist/aos.css"
      rel="stylesheet"
    />
    <script>
      try {
        const theme = localStorage.getItem('theme');
        if (theme === 'dark' || (!theme && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
          document.documentElement.classList.add('dark');
        }
      } catch (e) {}
    </script>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
      AOS.init({
        duration: 800,
        once: true,
        offset: 100,
        easing: 'ease-in-out'
      });
    </script>
    <script type="module" src="/src/index.js"></script>
  </body>
</html>
