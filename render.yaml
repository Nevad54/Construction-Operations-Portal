services:
  - type: web
    name: portfolio-ops-backend
    env: node
    rootDir: backend
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: MONGO_URI
        value: ${MONGO_URI}
      - key: ADMIN_USER
        value: ${ADMIN_USER}
      - key: ADMIN_PASS
        value: ${ADMIN_PASS}
      - key: SESSION_SECRET
        value: ${SESSION_SECRET}
      - key: EMAIL_USER
        value: ${EMAIL_USER}
      - key: EMAIL_PASS
        value: ${EMAIL_PASS}
      - key: CONTACT_EMAIL
        value: ${CONTACT_EMAIL}
      - key: RECAPTCHA_SECRET_KEY
        value: ${RECAPTCHA_SECRET_KEY}
      - key: CORS_ORIGINS
        value: ${CORS_ORIGINS}
      - key: CLOUDINARY_CLOUD_NAME
        value: ${CLOUDINARY_CLOUD_NAME}
      - key: CLOUDINARY_API_KEY
        value: ${CLOUDINARY_API_KEY}
      - key: CLOUDINARY_API_SECRET
        value: ${CLOUDINARY_API_SECRET}
      - key: CLOUDCONVERT_API_KEY
        value: ${CLOUDCONVERT_API_KEY}

  - type: web
    name: portfolio-ops-frontend
    env: static
    buildCommand: npm install && npm run build
    staticPublishPath: build
    envVars:
      - key: REACT_APP_API_URL
        value: ${REACT_APP_API_URL}
      - key: REACT_APP_RECAPTCHA_SITE_KEY
        value: ${REACT_APP_RECAPTCHA_SITE_KEY}

