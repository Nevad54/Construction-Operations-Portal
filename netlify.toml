[build]
  command = "npm install && npm run build"
  publish = "build"
  functions = "netlify/functions"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/:splat"
  status = 200

[build.environment]
  NODE_VERSION = "18"
  NPM_VERSION = "9"
  NODE_ENV = "production"
  REACT_APP_API_BASE_URL = "https://mastertech3.netlify.app"
  REACT_APP_RECAPTCHA_SITE_KEY = "6Ld6MSErAAAAALZQPgxDGLtC86B1JPq4STi-EURa"
